<!DOCTYPE html>
<html lang="tr">
<head>

<link rel="icon" type="image/png" href="favicon.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instagram Sipariş | Kae Aizawa</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="market.css">

</head>

<body>

<div class="bg-glow"></div>

<header class="navbar">

<div class="logo">K'</div>

<nav>
<a href="index.html">Ana Sayfa</a>
<a href="products.html"></a>
<a href="payment.html"></a>
</nav>

</header>

<section class="order-page">

<div class="order-box">

<a href="products.html" class="back-btn">
← Geri Dön
</a>

<h1>Instagram Sipariş Sistemi</h1>

<label>Hizmet Türü</label>

<select id="service">
<option value="0.03">Takipçi</option>
<option value="0.02">Beğeni</option>
<option value="0.04">İzlenme</option>
<option value="0.08">Yorum</option>
</select>

<label>Miktar</label>

<input type="text" id="amount" placeholder="1000">

<label>Kullanıcı Adı / Link</label>

<input type="text" placeholder="@kullaniciadi">

<label>Toplam Fiyat</label>

<div class="price-box">
<span id="price">0 TL</span>
</div>

<a href="SHOPIER_LINKIN" class="buy-btn">
Ödemeye Geç
</a>

</div>

</section>

<script>

const service =
document.getElementById("service");

const amount =
document.getElementById("amount");

const price =
document.getElementById("price");

function calculate(){

let cleanAmount =
amount.value.replace(/\./g,'');

let total =
(Number(service.value) * Number(cleanAmount || 0));

price.innerText =
total.toFixed(2) + " TL";

}

service.addEventListener(
"change",
calculate
);

amount.addEventListener(
"input",
calculate
);

calculate();

</script>

</body>
</html>
