<!DOCTYPE html>
<html lang="tr">
<head>
<link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Sipariş | Kae Aizawa</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="market.css">
</head>

<body>

<div class="bg-glow"></div>

<header class="navbar">
<a href="index.html" class="logo">K'</a>

<nav>
<a href="index.html"></a>
<a href="products.html"></a>
<a href="payment.html"></a>
</nav>
</header>

<section class="order-page">
<div class="order-box">

<a href="products.html" class="back-btn">Geri</a>

<h1>YouTube Sipariş Sistemi</h1>

<label>Hizmet Türü</label>
<select id="service">
<option value="25">Abone</option>
<option value="0.50">Beğeni</option>
<option value="0.10">İzlenme</option>
<option value="2.50">Yorum</option>
</select>

<label>Miktar</label>
<input type="text" id="amount" placeholder="1000">

<label>Kanal Adı / Link</label>
<input type="text" id="username" placeholder="Kanal adı veya kanal linki">

<div id="linkBox" style="display:none;">
<label>Video Linki</label>
<input type="text" id="postLink" placeholder="https://youtube.com/watch?v=...">
</div>

<label>Toplam Fiyat</label>
<div class="price-box">
<span id="price">0 TL</span>
</div>

<a href="SHOPIER_LINKIN" class="buy-btn">Ödemeye Geç</a>

</div>
</section>

<script>
const service = document.getElementById("service");
const amount = document.getElementById("amount");
const price = document.getElementById("price");
const linkBox = document.getElementById("linkBox");

function calculate(){
let cleanAmount = amount.value.replace(/\./g,'');
let total = Number(service.value) * Number(cleanAmount || 0);
price.innerText = total.toFixed(2) + " TL";

let selectedText = service.options[service.selectedIndex].text;

if(selectedText === "Abone"){
linkBox.style.display = "none";
}else{
linkBox.style.display = "block";
}
}

service.addEventListener("change", calculate);
amount.addEventListener("input", calculate);
calculate();
</script>

</body>
</html>
